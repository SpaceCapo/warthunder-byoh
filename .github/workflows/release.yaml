name: Release on Tag Push

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  flightmodel:
    name: "Gather Flight Model Artifacts"
    runs-on: ubuntu-latest
    outputs:
      fmversion: ${{ steps.fetch.outputs.fmversion }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Fetch Flight Model
        id: fetch
        run: |
          make fetch-fm
          FM_VERSION=$(cat data/fm/version_tag)
          echo "fmversion=$FM_VERSION" >> $GITHUB_OUTPUT
          find ./data 
      - name: Upload Flight Model 
        uses: actions/upload-artifact@v4
        with:
          name: fm
          path: data

  build-macos:
    runs-on: ubuntu-latest
    needs: flightmodel
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Extract version
        id: vars
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT    
      - name: Download shared assets
        uses: actions/download-artifact@v4
        with:
          name: fm
          path: .
      - name: Flatten
        run: |
          echo "----- data -----"
          find ./data -print
          echo "-----  fm  -----"
          find ./fm -print
          mv ./fm/* ./data/
          rm -rf ./fm 
      - name: Debugdir
        run: |
          find ./data -print
      - name: Build and package macos
        id: package-macos
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          TAG: ${{ steps.vars.outputs.tag }}
          FM_VERSION: ${{ needs.flightmodel.outputs.fmversion }}
        run: |
          make mac-app
          mkdir -p output/
          # tgz the output
          tar -czf output/warthunder-byoh-${TAG}-fm-${FM_VERSION}-macos-universal.tgz -C release/macos .
      - name: Upload macos 
        uses: actions/upload-artifact@v4
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          TAG: ${{ steps.vars.outputs.tag }}
          FM_VERSION: ${{ needs.flightmodel.outputs.fmversion }}
        with:
          name: warthunder-byoh-${{ steps.vars.outputs.tag }}-fm-${{ needs.flightmodel.outputs.fmversion }}-macos-universal.tgz
          path: output/warthunder-byoh-${{ steps.vars.outputs.tag }}-fm-${{ needs.flightmodel.outputs.fmversion }}-macos-universal.tgz

  build-linux:
    runs-on: ubuntu-latest
    needs: flightmodel
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Extract version
        id: vars
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT 
      - name: Download shared assets
        uses: actions/download-artifact@v4
        with:
          name: fm
          path: .
      - name: Flatten
        run: |
          echo "----- data -----"
          find ./data -print
          echo "-----  fm  -----"
          find ./fm -print
          mv ./fm/* ./data/
          rm -rf ./fm 
      - name: Build and package linux
        id: package-linux
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          TAG: ${{ steps.vars.outputs.tag }}
          FM_VERSION: ${{ needs.flightmodel.outputs.fmversion }}
        run: |
          make linux-all-pkg
          mkdir -p output/
          # tgz the output
          tar -czf output/warthunder-byoh-${TAG}-fm-${FM_VERSION}-linux-x64.tgz -C release/linux .
      - name: Upload linux 
        uses: actions/upload-artifact@v4
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          TAG: ${{ steps.vars.outputs.tag }}
          FM_VERSION: ${{ needs.flightmodel.outputs.fmversion }}
        with:
          name: warthunder-byoh-${{ steps.vars.outputs.tag }}-fm-${{ needs.flightmodel.outputs.fmversion }}-linux-x64.tgz
          path: output/warthunder-byoh-${{ steps.vars.outputs.tag }}-fm-${{ needs.flightmodel.outputs.fmversion }}-linux-x64.tgz

  build-windows:
    runs-on: ubuntu-latest
    needs: flightmodel
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Extract version
        id: vars
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT 
      - name: Download shared assets
        uses: actions/download-artifact@v4
        with:
          name: fm
          path: .
      - name: Flatten
        run: |
          echo "----- data -----"
          find ./data -print
          echo "-----  fm  -----"
          find ./fm -print
          mv ./fm/* ./data/
          rm -rf ./fm      
      - name: Build and package windows
        id: package-windows
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          TAG: ${{ steps.vars.outputs.tag }}
          FM_VERSION: ${{ needs.flightmodel.outputs.fmversion }}
        run: |
          make windows-pkg
          mkdir -p output/
          # zip
          cd release/windows && zip -r ../../output/warthunder-byoh-${TAG}-fm-${FM_VERSION}-windows-x64.zip .
      - name: Upload windows 
        uses: actions/upload-artifact@v4
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          TAG: ${{ steps.vars.outputs.tag }}
          FM_VERSION: ${{ needs.flightmodel.outputs.fmversion }}
        with:
          name: warthunder-byoh-${{ steps.vars.outputs.tag }}-fm-${{ needs.flightmodel.outputs.fmversion }}-windows-x64.zip
          path: output/warthunder-byoh-${{ steps.vars.outputs.tag }}-fm-${{ needs.flightmodel.outputs.fmversion }}-windows-x64.zip

  release:
    runs-on: ubuntu-latest
    needs: [flightmodel, build-macos, build-linux, build-windows]
    steps:
      - name: Extract version
        id: vars
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: .
      - name: Collect Artifacts
        run: |
          mkdir release-files
          find . -type f \( -name "*.tgz" -o -name "*.zip" \) -exec mv -v {} release-files/ \;
      - name: Get previous release tag
        id: prev_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"

          PREV_TAG=$(gh api \
            repos/${{ github.repository }}/releases \
            --jq 'map(select(.tag_name != "'"$CURRENT_TAG"'")) | first | .tag_name')

          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"  
      - name: Generate Auto-Generated Release Notes
        id: autonotes
        run: |
          git log "${{ steps.prev_release.outputs.prev_tag }}..HEAD" \
          --pretty=format:'%H' \
          | while read sha; do
            AUTHOR=$(gh api repos/${GITHUB_REPOSITORY}/commits/$sha --jq '.author.login // .commit.author.name')
            SUBJECT=$(git log -1 --pretty=%s $sha)
            SHORT=$(git rev-parse --short $sha)

            echo "- $SUBJECT — @$AUTHOR ($SHORT)"
          done > auto_notes.md
      - name: Build Final Release Notes
        id: finalnotes
        run: |
          echo "## War Thunder BYOH (Bring Your Own HUD) Release ${{ steps.vars.outputs.tag }}" > body.md            
          echo "" >> body.md
          echo "**War Thunder BYO Flight Model Version:** ${{ needs.flightmodel.outputs.fmversion }} [(GitHub Link)](https://github.com/SpaceCapo/warthunder-byo-fm/releases/${{ needs.flightmodel.outputs.fmversion }})" >> body.md
          echo "" >> body.md
          echo "### Details" >> body.md
          cat auto_notes.md >> body.md
      - name: Create Release
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          TAG: ${{ steps.vars.outputs.tag }}
          FM_VERSION: ${{ needs.flightmodel.outputs.fmversion }}
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.vars.outputs.tag }}
          files: release-files/*
          generate_release_notes: true
          body_path: body.md
          previous_tag: ${{ steps.prev_release.outputs.prev_tag }}
